# --- METADATA ---
sonar.projectKey=nvcloud
sonar.projectName=StockVision - NewVision Technology Centre
sonar.projectVersion=1.0

# --- SOURCE ---
sonar.sources=.
sonar.sourceEncoding=UTF-8

# --- EXCLUSÕES ---
sonar.exclusions=\
  vendor/**, \
  node_modules/**, \
  public/uploads/**, \
  assets/**, \
  **/*.sql, \
  **/*.log, \
  **/*.bak*, \
  tmp_*.php, \
  fix_*.php, \
  executar_fix.php, \
  find_boundaries.php, \
  map_sections.php, \
  split_pages.php, \
  verificar_catalogo.php, \
  config.example.php, \
  git_restore.bat, \
  restore_and_split.bat

# --- QUALIDADE ---
sonar.php.file.suffixes=.php
